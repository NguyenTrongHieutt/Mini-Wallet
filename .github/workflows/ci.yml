name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test backend on the supported Node runtime
        run: |
          docker run --rm \
            -v "$PWD/backend:/app" \
            -w /app \
            node:8.9.0 \
            sh -lc "npm install --ignore-scripts && npm test && npm run test:syntax"
      - name: Start Mongo replica set
        run: |
          docker run -d --name mini-wallet-ci-mongo \
            -p 27017:27017 \
            mongo:4.4 \
            mongod --replSet rs0 --bind_ip_all
          for attempt in $(seq 1 60); do
            if docker exec mini-wallet-ci-mongo mongo --quiet --eval "db.adminCommand('ping').ok" | grep -q 1; then
              break
            fi
            sleep 1
          done
          docker exec mini-wallet-ci-mongo mongo --quiet --eval \
            "rs.initiate({_id:'rs0',members:[{_id:0,host:'127.0.0.1:27017'}]})"
          for attempt in $(seq 1 60); do
            if docker exec mini-wallet-ci-mongo mongo --quiet --eval "rs.isMaster().ismaster" | grep -q true; then
              break
            fi
            sleep 1
          done
      - name: Run backend replica-set integration smoke
        run: |
          docker run --rm --network host \
            -e MONGO_INTEGRATION_URI="mongodb://127.0.0.1:27017/mini_wallet_ci_integration?replicaSet=rs0" \
            -v "$PWD/backend:/app" \
            -w /app \
            node:8.9.0 \
            npm run test:integration

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Check API contract
        working-directory: frontend
        run: npm run contract:check
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Unit tests
        working-directory: frontend
        run: npm test
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: End-to-end tests
        working-directory: frontend
        run: npm run test:e2e
